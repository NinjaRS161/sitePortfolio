<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое Портфолио - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <a href="{{ url_for('index') }}">Мое Портфолио</a>
                </div>
                <ul class="nav-menu">
                    <li><a href="{{ url_for('index') }}">Главная</a></li>
                    <li><a href="{{ url_for('about') }}">Обо мне</a></li>
                    <li><a href="{{ url_for('portfolio') }}">Портфолио</a></li>
                    <li><a href="{{ url_for('contacts') }}">Контакты</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025-2026 Мое Портфолио. Все права защищены.</p>
            <p>Сайт разработан на Flask</p>
        </div>
    </footer>
</body>
</html>
